<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="1"/>
      <stop offset="50%" stop-color="#00a8cc" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#006080" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#0088aa"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <circle cx="256" cy="256" r="256" fill="#0a0a0f"/>
  
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#ring)" stroke-width="8" opacity="0.3"/>
  <circle cx="256" cy="256" r="160" fill="none" stroke="url(#ring)" stroke-width="6" opacity="0.4"/>
  <circle cx="256" cy="256" r="120" fill="none" stroke="url(#ring)" stroke-width="4" opacity="0.5"/>
  
  <!-- Core glow -->
  <circle cx="256" cy="256" r="100" fill="url(#glow)"/>
  
  <!-- Core -->
  <circle cx="256" cy="256" r="60" fill="#00d4ff"/>
  <circle cx="256" cy="256" r="40" fill="#ffffff" opacity="0.9"/>
  <circle cx="256" cy="256" r="20" fill="#00d4ff"/>
</svg>
